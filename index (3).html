<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Votoraty Academy</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d3d1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Votoraty">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="description" content="Gestão completa da escolinha Votoraty Academy.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#0d3d1a;--gd:#071f0d;
  --gold:#b8860b;--gold-l:#f5c842;
  --surface:#f7f6f2;--surface-2:#efede8;
  --border:#e4e1d9;
  --text:#1a1a18;--text-2:#6b6860;--text-3:#aaa89f;
  --radius:14px;--radius-sm:9px;
  --shadow:0 2px 12px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);
  --shadow-md:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--surface-2);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px 12px}

/* PHONE FRAME */
.phone{width:100%;max-width:390px;border-radius:36px;overflow:hidden;background:#fff;box-shadow:0 24px 80px rgba(0,0,0,.18),0 4px 16px rgba(0,0,0,.08),inset 0 0 0 1px rgba(255,255,255,.6);min-height:680px;display:flex;flex-direction:column;border:1.5px solid rgba(0,0,0,.08)}

/* STATUS BAR */
.sbar{background:var(--color,#0d3d1a);padding:9px 20px 7px;display:flex;justify-content:space-between;align-items:center;transition:background .35s}
.sbar span{color:rgba(255,255,255,.95);font-size:11px;font-weight:500;letter-spacing:.01em}

/* HEADER */
.hdr{padding:14px 20px 18px;transition:background .35s;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,.06) 0%,transparent 60%);pointer-events:none}
.hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.08),rgba(255,255,255,.15),rgba(255,255,255,.08))}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:22px;font-weight:400;color:#fff;letter-spacing:.06em;line-height:1}
.hdr p{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px;font-weight:400;letter-spacing:.01em}
.cat-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);color:#fff;font-size:10px;font-weight:600;padding:4px 11px;border-radius:20px;margin-top:8px;border:1px solid rgba(255,255,255,.12);letter-spacing:.02em}

/* NAV TABS */
.nav-s{display:flex;overflow-x:auto;background:#fff;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--border);padding:0 4px}
.nav-s::-webkit-scrollbar{display:none}
.nt{flex-shrink:0;padding:10px 13px;font-size:10px;font-weight:600;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;letter-spacing:.03em;text-transform:uppercase}
.nt.on{color:var(--color,#0d3d1a);border-bottom-color:var(--color,#0d3d1a)}

/* SCREENS */
.scr{display:none;padding:14px 15px;flex:1;overflow-y:auto}
.scr.on{display:block}

/* BOTTOM NAV */
.bnav{display:flex;border-top:1px solid var(--border);padding:8px 0 10px;background:#fff;flex-shrink:0}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:opacity .15s}
.bi i{font-size:19px;color:var(--text-3);transition:color .2s}
.bi span{font-size:8px;color:var(--text-3);transition:color .2s;font-weight:600;letter-spacing:.03em;text-transform:uppercase}
.bi.on i,.bi.on span{font-weight:700}

/* LABELS */
.lbl{font-size:9px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 7px}
.lbl:first-child{margin-top:0}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.cw{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}

/* BUTTONS */
.btn-g{color:#fff;border:none;padding:13px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;cursor:pointer;width:100%;margin-top:6px;background:var(--color,#0d3d1a);transition:all .2s;letter-spacing:.02em;box-shadow:0 4px 12px rgba(0,0,0,.18)}
.btn-g:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,.22)}
.btn-g:active{transform:translateY(0)}
.btn-blue{background:#185fa5;color:#fff;border:none;padding:10px 14px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;cursor:pointer;width:100%;margin-top:5px;box-shadow:0 3px 10px rgba(24,95,165,.3)}
.btn-sm{background:#fff;border:1px solid var(--border);color:var(--text-2);padding:5px 11px;border-radius:7px;font-size:10px;cursor:pointer;font-weight:600;transition:all .15s;box-shadow:var(--shadow)}
.btn-sm:hover{border-color:var(--color,#0d3d1a);color:var(--color,#0d3d1a)}

/* FORM FIELDS */
.field{margin-bottom:10px}
.field label{font-size:10px;color:var(--text-3);display:block;margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{width:100%;font-size:12px;padding:9px 12px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',system-ui;transition:all .2s;font-weight:500}
.field textarea{resize:none;height:54px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--color,#0d3d1a);background:#fff;box-shadow:0 0 0 3px rgba(13,61,26,.08)}

/* NOTIFICATION */
.notif{border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:500;box-shadow:var(--shadow-md)}

/* TOGGLE */
.toggle{width:44px;height:26px;border-radius:13px;background:var(--border);position:relative;cursor:pointer;transition:background .25s;flex-shrink:0}
.toggle.on{background:var(--color,#0d3d1a)}
.toggle-k{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .25s;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.toggle.on .toggle-k{transform:translateX(18px)}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{font-size:10px;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;background:#fff;color:var(--text-2);transition:all .15s;font-weight:500}
.chip:hover{border-color:var(--color,#0d3d1a);color:var(--color,#0d3d1a)}
.chip.on{font-weight:700;border-color:var(--color,#0d3d1a);background:var(--color,#0d3d1a);color:#fff}

/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;background:var(--color,#0d3d1a);font-size:11px;letter-spacing:.03em}

/* PROGRESS */
.prog{background:var(--border);border-radius:4px;height:4px;margin-top:4px;overflow:hidden}
.prog-f{height:4px;border-radius:4px;background:var(--color,#0d3d1a);transition:width .5s ease}

/* TAGS */
.tag{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.03em}
.tg{background:#dcf0e0;color:#1a5c26}
.tb{background:#dceaf8;color:#0a3d7a}
.ta{background:#faebd7;color:#7a4010}
.tr{background:#fce8e8;color:#8b1a1a}
.tp{background:#ece9fd;color:#3c2e9e}

/* CHAMADA ITEMS */
.cr-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:#fff;margin-bottom:6px;transition:border-color .15s;box-shadow:var(--shadow)}
.cr-item:hover{border-color:rgba(13,61,26,.15)}
.crb{width:34px;height:34px;border-radius:50%;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.crb-p{background:#dcf0e0;color:#1a5c26}
.crb-p.on{background:#0d3d1a;color:#fff;box-shadow:0 2px 8px rgba(13,61,26,.35)}
.crb-f{background:#fce8e8;color:#8b1a1a}
.crb-f.on{background:#c0392b;color:#fff;box-shadow:0 2px 8px rgba(192,57,43,.35)}

/* BAV BUTTONS */
.bav-row{display:flex;gap:6px;margin-bottom:10px}
.bav{flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .18s;background:#fff}
.bav:hover{transform:translateY(-1px)}

/* CHECK ITEMS */
.check-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.check-item:last-child{border-bottom:none}
.chk{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s}
.chk.on{background:var(--color,#0d3d1a);border-color:var(--color,#0d3d1a);box-shadow:0 2px 8px rgba(13,61,26,.3)}
.chk-lbl{font-size:12px;color:var(--text);flex:1;font-weight:500}
.chk-lbl.done{text-decoration:line-through;color:var(--text-3)}
.xp-tag{font-size:9px;font-weight:700;padding:3px 7px;border-radius:20px;background:#dcf0e0;color:#1a5c26;flex-shrink:0;letter-spacing:.02em}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-c{border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.stat-v{font-family:'Bebas Neue',sans-serif;font-size:28px;font-weight:400;line-height:1;letter-spacing:.04em}
.stat-l{font-size:10px;margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

/* STICKER ALBUM */
.stk-mini{border-radius:10px;overflow:hidden;border:2px solid #c8940a;display:flex;flex-direction:column;background:linear-gradient(160deg,#fff8e6,#ffe8a0);box-shadow:0 3px 10px rgba(200,148,10,.2)}
.stk-ribbon{background:#c8940a;color:#fff;text-align:center;font-size:6px;font-weight:700;padding:3px 2px;letter-spacing:.08em;text-transform:uppercase}
.stk-body{padding:7px 4px;display:flex;flex-direction:column;align-items:center}
.stk-foot{background:rgba(200,148,10,.15);padding:3px;text-align:center;font-size:6px;font-weight:700;color:#5a3c00;letter-spacing:.04em}
.stk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}

/* ALERTS */
.alerta{border-radius:var(--radius);padding:12px 13px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;box-shadow:var(--shadow)}
.al-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* CONFIG ROW */
.config-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.config-row:last-child{border-bottom:none}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.on{display:flex}
.modal-sheet{background:#fff;border-radius:24px 24px 0 0;padding:20px 18px 28px;width:100%;max-width:390px;max-height:85vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;font-weight:400;color:var(--text);margin-bottom:14px;letter-spacing:.06em}

/* TELA INICIAL */
#tela-inicial{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:0;overflow-y:auto;
  background:#071f0d;
}
#tela-inicial::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%,rgba(22,96,36,.6) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%,rgba(184,134,11,.15) 0%,transparent 60%),
    radial-gradient(ellipse 100% 80% at 50% 50%,rgba(13,61,26,.8) 0%,rgba(7,31,13,1) 100%);
  z-index:0;pointer-events:none;
}
#tela-inicial > *{position:relative;z-index:1}
.tela-inner{display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px;padding:40px 20px 32px}
.logo-area{text-align:center;margin-bottom:36px}
.logo-badge{
  width:80px;height:80px;border-radius:22px;background:linear-gradient(145deg,#1a5c26,#0d3d1a);
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
  box-shadow:0 8px 32px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.08);font-size:38px;
}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:32px;font-weight:400;color:#fff;letter-spacing:.12em;text-transform:uppercase;line-height:1}
.logo-sub{font-size:12px;color:rgba(255,255,255,.45);margin-top:6px;letter-spacing:.12em;text-transform:uppercase;font-weight:500}
.logo-divider{width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(184,134,11,.6),transparent);margin:16px auto 0}
.perfil-section{width:100%;margin-bottom:6px}
.perfil-section-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px;padding-left:4px}
.perfil-btn{
  width:100%;padding:14px 16px;border-radius:16px;border:none;cursor:pointer;
  display:flex;align-items:center;gap:13px;margin-bottom:8px;text-align:left;
  transition:all .2s;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
}
.perfil-btn:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.16);transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
.perfil-btn:active{transform:translateY(0)}
.p-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid rgba(255,255,255,.08)}
.p-title{font-size:13px;font-weight:700;color:#fff;letter-spacing:.01em}
.p-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px;font-weight:400}
.perfil-arrow{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0}
</style>
</head>

function setCor(cor){
  document.documentElement.style.setProperty('--color', cor);

  if(sbar) sbar.style.background = cor;
  if(hdr) hdr.style.background = cor;
  document.querySelectorAll('.btn-g').forEach(b=>b.style.background=cor);
  document.querySelectorAll('.toggle.on').forEach(t=>t.style.background=cor);
}

// =====================
// ENTRAR
// =====================
function entrar(perfil){
  perfilAtual = perfil;
  document.getElementById('tela-inicial').style.display='none';
  document.getElementById('app').style.display='flex';
  const cor = CORES[perfil.replace('prof_','')];
  setCor(cor);
  configurarPerfil(perfil, cor);
}

function configurarPerfil(perfil, cor){
  const isProfDir = perfil !== 'atleta';
  const isDir = perfil === 'diretor';
  const catKey = perfil.replace('prof_','');

  if(perfil === 'atleta') montarAtleta(cor);

}

function renderChamada(cat, cor){
  let rows = cat.atletas.map((a,i)=>{
    const pc = a.pres>=85?'#27500a':a.pres>=70?'#854f0b':'#a32d2d';
    return `<div class="cr-item">
      <div class="av" style="width:32px;height:32px;font-size:11px;background:${cor}">${a.sig}</div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700">${a.nome}</div>
        <div style="font-size:9px;color:#aaa">${a.pos} · <span style="color:${pc}">${a.pres}% presença</span></div>
      </div>
      <div style="display:flex;gap:4px">
        <button class="crb crb-p" onclick="marcC('c${i}','P',this,'${cor}')" id="cp-c${i}">P</button>
        <button class="crb crb-f" onclick="marcC('c${i}','F',this,'${cor}')" id="cf-c${i}">F</button>
      </div>
    </div>`;
  }).join('');

    <span style="font-size:12px;font-weight:700">Chamada — ${cat.nome}</span>

  ${rows}
  <button class="btn-g" style="background:${cor}" onclick="salvarChamada(${cat.atletas.length})">Salvar chamada e notificar pais</button>`;
}

function marcC(id,tipo,el,cor){
  chamadas[id]=tipo;
  document.getElementById('cp-'+id).classList.toggle('on',tipo==='P');
  document.getElementById('cp-'+id).style.background = tipo==='P'?cor:'#eaf3de';
  document.getElementById('cp-'+id).style.color = tipo==='P'?'#fff':'#27500a';
  document.getElementById('cf-'+id).classList.toggle('on',tipo==='F');
  const t=Object.keys(chamadas).length;
  const all=document.querySelectorAll('.cr-item').length;
  document.getElementById('cnt-c').textContent=t+'/'+all;
  document.getElementById('prog-c').style.width=(t/all*100)+'%';
}

function salvarChamada(total){
  const p=Object.values(chamadas).filter(v=>v==='P').length;
  const f=Object.values(chamadas).filter(v=>v==='F').length;
  showN('✓ Chamada salva! '+p+' presentes · '+f+' faltas · Pais notificados');
}

function togAv(i){const d=document.getElementById('avd-'+i);d.style.display=d.style.display==='none'?'block':'none';}

  el.closest('.bav-row').querySelectorAll('.bav').forEach(b=>b.style.fontWeight='600');

  const b=document.getElementById('avb-'+i);b.textContent=txt;b.style.background=bg;b.style.color=cor;

function enviarMsg(){
  const txt=document.getElementById('msg-txt');

  showN('✓ Mensagem enviada! Atletas e pais notificados.');

function togChk(el,cor){
  const b=el.querySelector('.chk');
  const l=el.querySelector('.chk-lbl');
  const on=b.classList.toggle('on');
  if(on){b.style.background=cor;b.style.borderColor=cor;}
  else{b.style.background='';b.style.borderColor='#ddd';}
  l.classList.toggle('done',on);
}

function salvarCheckin(tipo){
  const sel=document.querySelectorAll('.chk.on').length;
  showN('✓ Check-in de '+tipo+' salvo! +'+sel*10+' XP conquistados!');
}

function montarNav(items, cor){
  document.getElementById('nav').innerHTML = items.map((nm,i)=>
    `<div class="nt${i===0?' on':''}" onclick="goTab(${i},'${cor}')" style="${i===0?'color:'+cor+';border-bottom-color:'+cor:''}">${nm}</div>`
  ).join('');
}

function montarBnav(items, cor){
  document.getElementById('bnav').innerHTML = items.map((it,i)=>
    `<div class="bi${i===0?' on':''}" onclick="goTab(${i},'${cor}')">
      <i class="ti ${it.icon}" style="color:${i===0?cor:'#ccc'}"></i>
      <span style="color:${i===0?cor:'#ccc'}">${it.label}</span>
    </div>`
  ).join('');
}

function goTab(idx, cor){
  document.querySelectorAll('[id^="s-"]').forEach((s,i)=>s.classList.toggle('on',i===idx));
  document.querySelectorAll('#nav .nt').forEach((t,i)=>{
    t.classList.toggle('on',i===idx);
    t.style.color=i===idx?cor:'#bbb';
    t.style.borderBottomColor=i===idx?cor:'transparent';
  });
  document.querySelectorAll('#bnav .bi').forEach((t,i)=>{
    t.classList.toggle('on',i===idx);
    t.querySelector('i').style.color=i===idx?cor:'#ccc';
    t.querySelector('span').style.color=i===idx?cor:'#ccc';
  });
}

function showN(txt,err){
  const el=document.getElementById('notif-el');
  document.getElementById('notif-txt').textContent=txt;
  el.style.background=err?'#fce8e8':'#dcf0e0';
  el.style.borderColor=err?'#e8a0a0':'#8ec99a';
  el.style.color=err?'#8b1a1a':'#1a5c26';
  document.getElementById('notif-wrap').style.display='block';
  setTimeout(()=>document.getElementById('notif-wrap').style.display='none',3200);
}

let offlineMode=false;
function toggleOff(){
  offlineMode=!offlineMode;
  document.getElementById('offline-dot').style.display=offlineMode?'inline-block':'none';
  document.getElementById('btn-off').textContent=offlineMode?'Online':'Offline';
  showN(offlineMode?'📵 Modo offline. Dados salvos no celular.':'📶 Online! Sincronizando...');
}

function sair(){

}

function cadastrarAtleta(){

  fecharModal('modal-atleta');
  showN('✓ '+nm+' cadastrado! Acesso enviado ao responsável.');
  document.getElementById('m-nome').value='';

function abrirModal(id){document.getElementById(id).classList.add('on');}

// Estado das convocações
let convSel = {};
let jogoAtual = null;

function abrirConvJogo(id, titulo, data, hora, local, cor){
  jogoAtual = id;
  convSel = {};
  document.getElementById('conv-jogo-titulo').textContent = titulo;
  document.getElementById('conv-jogo-info').textContent = data+' · '+hora+' · '+local;
  document.getElementById('conv-count').textContent = '0';
  document.getElementById('painel-conv').style.display = 'block';
  // Reset checks
  document.querySelectorAll('[id^="conv-check-"]').forEach(el=>{
    el.style.background='';el.style.borderColor='#ddd';
  });
  document.getElementById('painel-conv').scrollIntoView({behavior:'smooth'});
}

function fecharConvJogo(){
  document.getElementById('painel-conv').style.display='none';
  jogoAtual=null;
}

function toggleConv(sig, cor){
  const check = document.getElementById('conv-check-'+sig);
  if(convSel[sig]){
    delete convSel[sig];
    check.style.background='';
    check.style.borderColor='#ddd';
  } else {
    convSel[sig]=true;
    check.style.background=cor;
    check.style.borderColor=cor;
  }
  document.getElementById('conv-count').textContent = Object.keys(convSel).length;
}

function convocarTodos(cor){
  document.querySelectorAll('[id^="conv-check-"]').forEach(el=>{
    const sig=el.id.replace('conv-check-','');
    convSel[sig]=true;
    el.style.background=cor;
    el.style.borderColor=cor;
  });
  document.getElementById('conv-count').textContent = Object.keys(convSel).length;
}

function limparConvocacao(){
  convSel={};
  document.querySelectorAll('[id^="conv-check-"]').forEach(el=>{
    el.style.background='';el.style.borderColor='#ddd';
  });
  document.getElementById('conv-count').textContent='0';
}

function atribuirPos(slot, pos){
  const nomes = Object.keys(convSel);
  if(nomes.length===0){showN('⚠️ Convoque atletas primeiro.',true);return;}
  const sigla = nomes[Math.floor(Math.random()*nomes.length)];
  slot.innerHTML=`<div style="width:34px;height:34px;border-radius:50%;background:#c8940a;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:10px;font-weight:700;color:#fff">${sigla}</div><div style="font-size:8px;color:rgba(255,255,255,.7);text-align:center;margin-top:2px">${pos}</div>`;
}

function publicarConvocacao(cor){
  const qtd = Object.keys(convSel).length;
  if(qtd===0){showN('⚠️ Selecione pelo menos um atleta.',true);return;}
  const nomes = Object.keys(convSel).join(', ');
  if(jogoAtual){
    const resumo = document.getElementById('conv-resumo-'+jogoAtual);
    if(resumo) resumo.textContent = qtd+' atletas convocados';
  }
  document.getElementById('painel-conv').style.display='none';
  showN('✓ '+qtd+' atletas convocados! Todos notificados no app.');
  // Adiciona no feed do atleta se estiver visível
  const feed = document.getElementById('feed-msgs');
  if(feed){
    const item = document.createElement('div');
    item.className='card';
    item.style.cssText='border-left:3px solid '+cor+';margin-bottom:8px;background:#f0fff4';
    item.innerHTML=`<div style="font-size:9px;font-weight:700;color:${cor};margin-bottom:3px">🏆 CONVOCAÇÃO OFICIAL · Técnico André</div>
    <div style="font-size:11px;color:#1a1a1a;line-height:1.6"><strong>Você foi convocado para o jogo!</strong><br>
    ${document.getElementById('conv-jogo-titulo')?document.getElementById('conv-jogo-titulo').textContent:'Próximo jogo'}<br>
    ${document.getElementById('conv-jogo-info')?document.getElementById('conv-jogo-info').textContent:''}</div>
    <div style="font-size:10px;color:#aaa;margin-top:4px">agora · automático</div>`;
    feed.insertBefore(item, feed.firstChild);
  }
}

          <span style="font-size:10px;color:${pc}">${a.pres}%</span>
        </div>`;
      }).join('')}

  <div style="background:#fff8e6;border:1px solid #e8c97a;border-radius:10px;padding:10px 12px;margin-top:4px">

function renderProfCat(catKey, cor){
  const cat = CATS_DATA[catKey];
  const catCor = CORES[catKey];
  if(!cat) return '<div style="padding:20px;text-align:center;color:#aaa">Carregando...</div>';

  return `
  <!-- SELETOR DE AÇÃO -->
  <div style="display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap">
    <button onclick="mostrarPainel('${catKey}','chamada','${catCor}')" style="flex:1;background:${catCor};color:#fff;border:none;padding:8px 6px;border-radius:9px;font-size:10px;font-weight:700;cursor:pointer">📋 Chamada</button>
    <button onclick="mostrarPainel('${catKey}','avaliacao','${catCor}')" style="flex:1;background:${catCor}22;color:${catCor};border:none;padding:8px 6px;border-radius:9px;font-size:10px;font-weight:700;cursor:pointer">⭐ Avaliar</button>
    <button onclick="mostrarPainel('${catKey}','treino','${catCor}')" style="flex:1;background:${catCor}22;color:${catCor};border:none;padding:8px 6px;border-radius:9px;font-size:10px;font-weight:700;cursor:pointer">⚽ Treino</button>
    <button onclick="mostrarPainel('${catKey}','convocar','${catCor}')" style="flex:1;background:${catCor}22;color:${catCor};border:none;padding:8px 6px;border-radius:9px;font-size:10px;font-weight:700;cursor:pointer">🏆 Convocar</button>
  </div>

  <!-- PAINEL DINÂMICO -->
  <div id="painel-${catKey}">
    <!-- CHAMADA padrão -->
    <div class="lbl">Chamada — ${cat.nome} · hoje</div>
    <div style="background:#eee;border-radius:3px;height:4px;margin-bottom:8px"><div id="prog-${catKey}" style="height:4px;border-radius:3px;background:${catCor};width:0;transition:width .3s"></div></div>
    ${cat.atletas.map((a,i)=>{
      const pc=a.pres>=85?'#27500a':a.pres>=70?'#854f0b':'#a32d2d';
      return `<div class="cr-item">
        <div class="av" style="width:30px;height:30px;font-size:10px;background:${catCor}">${a.sig}</div>
        <div style="flex:1"><div style="font-size:12px;font-weight:700">${a.nome}</div>
        <div style="font-size:9px;color:#aaa">${a.pos} · <span style="color:${pc}">${a.pres}%</span> · ${a.gols} gols</div></div>
        <div style="display:flex;gap:4px">
          <button class="crb crb-p" onclick="marcC('${catKey}${i}','P',this,'${catCor}')" id="cp-${catKey}${i}">P</button>
          <button class="crb crb-f" onclick="marcC('${catKey}${i}','F',this,'${catCor}')" id="cf-${catKey}${i}">F</button>
        </div>
      </div>`;
    }).join('')}
    <button style="background:${catCor};color:#fff;border:none;padding:11px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;width:100%;margin-top:5px" onclick="showN('✓ Chamada ${cat.nome} salva! Pais notificados.')">Salvar chamada</button>
  </div>

  <!-- LISTA DE ATLETAS -->
  <div class="lbl" style="margin-top:12px">Atletas — ${cat.nome}</div>
  <div class="cw" style="padding:6px 12px">
    ${cat.atletas.map(a=>{
      const pc=a.pres>=85?'#27500a':a.pres>=70?'#854f0b':'#a32d2d';
      return `<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid #f0eeea">
        <div class="av" style="width:30px;height:30px;font-size:10px;background:${catCor}">${a.sig}</div>
        <div style="flex:1"><div style="font-size:12px;font-weight:700">${a.nome}</div>
        <div style="font-size:9px;color:#aaa">${a.pos} · Nível ${a.nivel} · ${a.gols} gols</div>
        <div class="prog"><div class="prog-f" style="width:${a.pres}%;background:${pc}"></div></div></div>
        <span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;color:${pc};background:${pc}18">${a.pres}%</span>
      </div>`;
    }).join('')}
  </div>`;
}

function mostrarPainel(catKey, tipo, cor){
  const paineis = {
    chamada: `Chamada marcada para ${CATS_DATA[catKey].nome}`,
    avaliacao: `Avaliação do ${CATS_DATA[catKey].nome} aberta`,
    treino: `Registrar treino do ${CATS_DATA[catKey].nome}`,
    convocar: `Convocação do ${CATS_DATA[catKey].nome} aberta`
  };
  showN('✓ '+paineis[tipo]);
}

function selDestProf(el){
  document.querySelectorAll('#prof-dest .chip').forEach(c=>{
    c.style.background=''; c.style.color=''; c.style.borderColor=''; c.style.fontWeight='';
    c.classList.remove('on');
  });
  el.classList.add('on');
  el.style.background='#eaf3de'; el.style.color='#27500a';
  el.style.borderColor='#97c459'; el.style.fontWeight='700';
}
</script>
